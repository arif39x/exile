# NATS Server Configuration
port: 4222
monitor_port: 8222

jetstream {
    store_dir: "/data/nats/jetstream"
    max_mem: 1G
    max_file: 10G
}

tls {
    cert_file: "/etc/nats/certs/server.crt"
    key_file: "/etc/nats/certs/server.key"
    ca_file: "/etc/nats/certs/ca.crt"
    verify: true
    timeout: 2
}

cluster {
    port: 6222
    routes = [
        "nats://nats-1:6222"
        "nats://nats-2:6222"
        "nats://nats-3:6222"
    ]
}
