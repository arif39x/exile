version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: exile
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./infrastructure/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  nats:
    image: nats:2.9-alpine
    command: "-js"
    ports:
      - "4222:4222"
      - "8222:8222"

  nomad-server:
    image: hashicorp/nomad:latest
    volumes:
      - ./infrastructure/nomad/server.hcl:/etc/nomad.d/server.hcl
    command: "agent -server -config=/etc/nomad.d/server.hcl"
    ports:
      - "4646:4646"

  vault:
    image: vault:1.13.3
    container_name: vault
    ports:
      - "8200:8200"
    volumes:
      - ./infrastructure/security/vault_config.hcl:/vault/config/vault_config.hcl
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_API_ADDR: "http://0.0.0.0:8200"
    command: "server -config=/vault/config/vault_config.hcl"
    cap_add:
      - IPC_LOCK

  xmrig-proxy-1:
    image: metal3d/xmrig-proxy:latest
    volumes:
      - ./infrastructure/mining/xmrig-proxy.json:/etc/xmrig-proxy/config.json
    depends_on:
      - vault

  xmrig-proxy-2:
    image: metal3d/xmrig-proxy:latest
    volumes:
      - ./infrastructure/mining/xmrig-proxy.json:/etc/xmrig-proxy/config.json
    depends_on:
      - vault

  haproxy:
    image: haproxy:2.8-alpine
    volumes:
      - ./infrastructure/mining/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    ports:
      - "3333:3333"
    depends_on:
      - xmrig-proxy-1
      - xmrig-proxy-2

  node-registry:
    build:
      context: ./control_plane
      dockerfile: Dockerfile.node-registry
    environment:
      DATABASE_URL: "postgres://postgres:password@db:5432/exile?sslmode=disable"
      NATS_URL: "nats://nats:4222"
    depends_on:
      - db
      - nats

  health-service:
    build:
      context: ./control_plane
      dockerfile: Dockerfile.health-service
    environment:
      DATABASE_URL: "postgres://postgres:password@db:5432/exile?sslmode=disable"
      NATS_URL: "nats://nats:4222"
    depends_on:
      - db
      - nats
